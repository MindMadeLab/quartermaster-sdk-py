services:
  code-runner:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - LOG_LEVEL=info
      - DEFAULT_TIMEOUT=30
      - DEFAULT_MEMORY=256m
      - DEFAULT_CPU_SHARES=512
      - DEFAULT_DISK=512m
      # Uncomment to enable authentication:
      # - CODE_RUNNER_API_KEYS=your-secret-key-1,your-secret-key-2
      # - AUTH_TOKEN=your-bearer-token
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
