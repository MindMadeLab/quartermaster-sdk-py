name: CI

on:
  push:
    branches: [master, develop]
  pull_request:
    branches: [master, develop]

jobs:
  # -----------------------------------------------------------------------
  # Test each package independently
  # -----------------------------------------------------------------------
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
        package:
          - quartermaster-providers
          - quartermaster-graph
          - quartermaster-tools
          - quartermaster-nodes
          - quartermaster-engine
          - quartermaster-mcp-client
          - quartermaster-code-runner

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true

      # uv sync resolves cross-package deps to the local editable workspace
      # members. Plain `pip install -e .` would try to fetch sibling packages
      # (e.g. quartermaster-engine needs quartermaster-graph) from PyPI, which
      # at best fetches the published version (potentially older than the
      # checkout) and at worst fails outright on first releases.
      - name: Sync workspace
        run: uv sync --all-packages

      # Each package's [dev] extras (pytest, respx, httpx, etc.) are not in
      # the root dev group, so install them per-package matrix cell.
      - name: Install package dev extras
        run: uv pip install -e "./${{ matrix.package }}[dev]"

      # ruff format (style) is enforced. ruff check (lint rules) is intentionally
      # NOT run here — there is pre-existing lint debt across packages
      # (UP042 StrEnum migration, E402 import ordering, etc.) that needs
      # dedicated cleanup PRs. Adding it as a CI gate now would block every
      # release behind that backlog. Track lint cleanup separately.
      #
      # The path is "." (the whole package) instead of "src/ tests/" because
      # quartermaster-nodes uses a flat layout (no src/ dir).
      - name: Format check with ruff
        working-directory: ${{ matrix.package }}
        run: uv run --no-sync ruff format --check .

      - name: Type check with mypy
        working-directory: ${{ matrix.package }}
        run: uv run --no-sync mypy src/ || true

      # Skip the `integration` marker globally — currently only used by
      # quartermaster-code-runner for tests that build/run Docker images.
      # Those are slow (10+ min) and don't belong in the per-PR test gate.
      # Run them locally / nightly with `pytest -m integration`.
      - name: Run tests
        working-directory: ${{ matrix.package }}
        run: uv run --no-sync pytest -v --tb=short -m "not integration"

  # -----------------------------------------------------------------------
  # Verify the SDK meta-package installs cleanly
  # -----------------------------------------------------------------------
  sdk:
    runs-on: ubuntu-latest
    needs: test
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install all packages from source
        run: |
          python -m pip install --upgrade pip
          pip install -e quartermaster-providers
          pip install -e quartermaster-graph
          pip install -e quartermaster-tools
          pip install -e quartermaster-nodes
          pip install -e quartermaster-engine
          pip install -e quartermaster-mcp-client
          pip install -e quartermaster-code-runner
          pip install -e quartermaster-sdk

      - name: Verify SDK imports
        run: |
          python -c "from quartermaster_sdk import Graph, GraphBuilder, NodeType; print('SDK imports OK')"
          python -c "from quartermaster_graph import Graph; print('Graph OK')"
          python -c "from quartermaster_providers import ProviderRegistry; print('Providers OK')"
          python -c "from quartermaster_tools import ToolRegistry; print('Tools OK')"
          python -c "from quartermaster_engine import FlowRunner; print('Engine OK')"
          python -c "from quartermaster_mcp_client import McpClient; print('MCP OK')"

  # The previous "examples" job (running every script in examples/ and
  # asserting exit-code 0) was removed — it produced false positives. CI
  # has no API keys, so run_graph() silently degrades and most examples
  # "passed" with Duration: 0.00s while doing nothing meaningful. The
  # 652-test pytest suite already verifies library behaviour; examples
  # are user-facing demos that belong on the user's machine, not in the
  # PR gate. If we want examples-as-tests in the future, port the few
  # API-key-free ones (06, 17, 18 part 1) into proper pytest cases.
