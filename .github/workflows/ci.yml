name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  # -----------------------------------------------------------------------
  # Test each package independently
  # -----------------------------------------------------------------------
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
        package:
          - quartermaster-providers
          - quartermaster-graph
          - quartermaster-tools
          - quartermaster-nodes
          - quartermaster-engine
          - quartermaster-mcp-client
          - quartermaster-code-runner

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        working-directory: ${{ matrix.package }}
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint with ruff
        working-directory: ${{ matrix.package }}
        run: |
          pip install ruff
          ruff check src/ tests/
          ruff format --check src/ tests/

      - name: Type check with mypy
        working-directory: ${{ matrix.package }}
        run: |
          pip install mypy
          mypy src/ || true

      - name: Run tests
        working-directory: ${{ matrix.package }}
        run: pytest -v --tb=short

  # -----------------------------------------------------------------------
  # Verify the SDK meta-package installs cleanly
  # -----------------------------------------------------------------------
  sdk:
    runs-on: ubuntu-latest
    needs: test
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install all packages from source
        run: |
          python -m pip install --upgrade pip
          pip install -e quartermaster-providers
          pip install -e quartermaster-graph
          pip install -e quartermaster-tools
          pip install -e quartermaster-nodes
          pip install -e quartermaster-engine
          pip install -e quartermaster-mcp-client
          pip install -e quartermaster-code-runner
          pip install -e quartermaster-sdk

      - name: Verify SDK imports
        run: |
          python -c "from quartermaster_sdk import Graph, GraphBuilder, NodeType; print('SDK imports OK')"
          python -c "from quartermaster_graph import Graph; print('Graph OK')"
          python -c "from quartermaster_providers import ProviderRegistry; print('Providers OK')"
          python -c "from quartermaster_tools import ToolRegistry; print('Tools OK')"
          python -c "from quartermaster_engine import FlowRunner; print('Engine OK')"
          python -c "from quartermaster_mcp_client import MCPClient; print('MCP OK')"

  # -----------------------------------------------------------------------
  # Run all examples to verify they work end-to-end
  # -----------------------------------------------------------------------
  examples:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install all packages from source
        run: |
          python -m pip install --upgrade pip
          pip install -e quartermaster-providers
          pip install -e quartermaster-graph
          pip install -e quartermaster-tools
          pip install -e quartermaster-nodes
          pip install -e quartermaster-engine

      - name: Run all examples
        run: |
          failed=0
          for example in examples/*.py; do
            echo "--- Running $example ---"
            if python "$example"; then
              echo "PASS: $example"
            else
              echo "FAIL: $example"
              failed=1
            fi
          done
          exit $failed
